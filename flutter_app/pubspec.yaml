name: trendradar_mobile
description: TrendRadar Mobile - 热点舆情监控应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # 状态管理
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  
  # 网络
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 工具
  intl: ^0.18.1
  url_launcher: ^6.2.4
  webview_flutter: ^4.4.1
  
  # 二维码
  qr_flutter: ^4.1.0
  
  # 图表
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
